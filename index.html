<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bloque Interactivo Adaptable</title>
    <meta property="og:title" content="Contenido Interactivo">
    <meta property="og:description" content="Bloque de texto responsivo para integración en plataformas externas.">
    <meta property="og:type" content="website">

    <style>
        /* CONFIGURACIÓN GLOBAL */
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent; /* Permite que se vea el fondo de Canva si es necesario */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita scrolls dobles en Canva */
        }

        /* CONTENEDOR DINÁMICO */
        .card {
            width: 90%;
            max-width: 600px;
            padding: clamp(20px, 5vw, 40px);
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* TIPOGRAFÍA */
        h1 {
            font-size: clamp(1.5rem, 7vw, 2.5rem);
            color: #111;
            margin-bottom: 0.5em;
            line-height: 1.2;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: #444;
            line-height: 1.5;
            margin: 0;
        }

        /* EFECTO PARA CANVA (Opcional) */
        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Funciona!</h1>
        <p>
            Este bloque es <strong>ultra-responsivo</strong>. 
            Si lo haces pequeño en Canva, el texto se ajustará solo. 
            Si lo estiras, se verá como una tarjeta profesional.
        </p>
    </div>

</body>
</html>
