<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bloque Responsive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .texto {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 800px;
      width: 100%;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 48px);
    }

    h2 {
      margin: 0;
      font-size: clamp(18px, 3.5vw, 28px);
      color: #555;
    }

    p {
      margin: 0;
      font-size: clamp(14px, 2.5vw, 18px);
      line-height: 1.6;
      color: #333;
    }

    /* Móvil */
    @media (max-width: 480px) {
      .texto {
        padding: 15px;
      }
    }

    /* Pantallas grandes */
    @media (min-width: 900px) {
      .texto {
        padding: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <div class="texto">
      <h1>Título Principal</h1>
      <h2>Subtítulo adaptable</h2>
      <p>
        Este párrafo se adapta automáticamente al tamaño de pantalla utilizando flexbox,
        media queries y tamaños fluidos con clamp(). Funciona tanto en escritorio como en móviles.
      </p>
    </div>
  </div>

</body>
</html>
