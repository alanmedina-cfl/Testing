<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
}

/* CONTENEDOR PRINCIPAL */
.contenedor {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  min-height: 100vh;
  box-sizing: border-box;
  padding: 2vw;
}

/* CAJA FLEXIBLE */
.texto {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: 100%;
  max-width: 900px;
}

/* TEXTO FLUIDO REAL */
h1 {
  margin: 0;
  font-size: clamp(22px, 6vw, 48px);
}

h2 {
  margin: 0;
  font-size: clamp(16px, 4vw, 28px);
}

p {
  margin: 0;
  font-size: clamp(14px, 3vw, 18px);
  line-height: 1.5;
}

/* EXTRA: en pantallas grandes lo centra mejor */
@media (min-width: 768px) {
  .contenedor {
    padding: 40px;
  }
}
</style>
</head>

<body>

<div class="contenedor">
  <div class="texto">
    <h1>Título Principal</h1>
    <h2>Subtítulo adaptable</h2>
    <p>
      Este bloque ahora sí es completamente responsive. Se adapta al ancho del iframe,
      escala el texto correctamente y no se rompe en móvil ni en Genially.
    </p>
  </div>
</div>

</body>
</html>
